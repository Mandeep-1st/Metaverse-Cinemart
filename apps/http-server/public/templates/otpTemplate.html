<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Your OTP Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f6f8;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center" style="padding: 24px">
          <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 480px;
              background: #ffffff;
              border-radius: 8px;
              padding: 24px;
            "
          >
            <!-- Header -->
            <tr>
              <td style="font-size: 20px; font-weight: bold; color: #111827">
                Verify your email
              </td>
            </tr>

            <!-- Greeting -->
            <tr>
              <td style="padding-top: 12px; color: #374151; font-size: 14px">
                Hi <strong>{{username}}</strong>,
              </td>
            </tr>

            <!-- Message -->
            <tr>
              <td style="padding-top: 12px; color: #374151; font-size: 14px">
                Use the following One-Time Password (OTP) to verify your email
                address <strong>{{email}}</strong>.
              </td>
            </tr>

            <!-- OTP Box -->
            <tr>
              <td align="center" style="padding: 24px 0">
                <div
                  style="
                    font-size: 28px;
                    font-weight: bold;
                    letter-spacing: 6px;
                    color: #111827;
                    background: #f3f4f6;
                    padding: 12px 24px;
                    border-radius: 6px;
                    display: inline-block;
                  "
                >
                  {{otp}}
                </div>
              </td>
            </tr>

            <!-- Expiry -->
            <tr>
              <td style="color: #6b7280; font-size: 13px">
                This OTP is valid for <strong>10 minutes</strong>. Do not share
                this code with anyone.
              </td>
            </tr>

            <!-- Warning -->
            <tr>
              <td style="padding-top: 16px; color: #6b7280; font-size: 13px">
                If you did not request this, please ignore this email.
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td
                style="
                  padding-top: 24px;
                  font-size: 12px;
                  color: #9ca3af;
                  text-align: center;
                "
              >
                © {{year}} Your App. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

<!--
variables expected 
{
  username: string;
  email: string;
  otp: string;
  year: string;
}
-->
